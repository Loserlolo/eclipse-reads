<!DOCTYPE html>
<html>
<head>
<title>Eclipse Reads</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

header{
padding:20px;
font-size:32px;
font-weight:bold;
}

.search{
padding:0 20px 20px;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
}

.section{
padding:20px;
}

.book{
background:#1f2937;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.book img{
width:100%;
border-radius:12px;
}

.book h2{
margin-top:10px;
}

.button{
display:inline-block;
padding:10px 20px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:10px;
}
</style>
</head>

<body>

<header>
🌙 Eclipse Reads
</header>

<div class="search">
<input placeholder="Search books...">
</div>

<div class="section">
<h1>Featured</h1>

<div class="book">
<img src="https://picsum.photos/500/700" alt="cover">
<h2>Spacious</h2>
<p>Do-hyun hated slow nights. Especially when they gave him time to think about Seo-yul.</p>

<a class="button" href="#">
Start Reading
</a>
</div>

</div>

</body>
</html>
